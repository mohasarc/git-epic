I', sans-serif" font-size="17" fill="#e8ecf5">And renown gathered upon the developer: a hundred stars in all.</text><animate attributeName="opacity" begin="10s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><text x="415" y="200" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" fill="#e8ecf5" font-weight="bold" letter-spacing="4">PRESENT DAY</text><text x="415" y="234" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#8b93a7" letter-spacing="2">2026-07-04</text><animate attributeName="opacity" begin="13.5s" dur="3s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><circle cx="415" cy="186" r="30" fill="#ffd27d" opacity="0.16"/><circle cx="415" cy="186" r="6" fill="#ffd27d"><animate attributeName="r" begin="16.5s" dur="7s" values="6;9;6" repeatCount="indefinite"/></circle><circle cx="648.39" cy="150.25" r="1.4" fill="#dbe6ff" opacity="0.2"><animate attributeName="opacity" begin="16.5s" dur="7s" values="0.2;0.8;0.2" repeatCount="indefinite"/></circle><circle cx="214.1" cy="36.02" r="1.4" fill="#dbe6ff" opacity="0.2"><animate attributeName="opacity" begin="16.5s" dur="7.95s" values="0.2;0.8;0.2" repeatCount="indefinite"/></circle><circle cx="306.53" cy="187.33" r="1.4" fill="#dbe6ff" opacity="0.2"><animate attributeName="opacity" begin="16.5s" dur="4.68s" values="0.2;0.8;0.2" repeatCount="indefinite"/></circle><circle cx="332.18" cy="361.66" r="1.4" fill="#dbe6ff" opacity="0.2"><animate attributeName="opacity" begin="16.5s" dur="5.03s" values="0.2;0.8;0.2" repeatCount="indefinite"/></circle><circle cx="237.52" cy="27.37" r="1.4" fill="#dbe6ff" opacity="0.2"><animate attributeName="opacity" begin="16.5s" dur="5.19s" values="0.2;0.8;0.2" repeatCount="indefinite"/></circle><circle cx="258.57" cy="139.81" r="1.4" fill="#dbe6ff" opacity="0.2"><animate attributeName="opacity"