    <text x="415" y="212" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="url(#gold-leaf)" font-weight="bold" letter-spacing="5">THE EPIC OF OCTOCAT</text>
    <path d="M 330 240 C 360 256 470 256 500 240" fill="none" stroke="url(#gold-leaf)" stroke-width="1.4"/>
    <text x="415" y="286" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#a08b55" letter-spacing="3">· anno MMXI ·</text>
    <animate attributeName="opacity" begin="0s" dur="3s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/>
  </g>

