    <text x="525" y="268" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#7a1f1f">❦</text>
    <text x="415" y="340" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#a08b55">✦ forge yours at git-epic.dev</text>
