 stroke-width="0.5" opacity="0"><animate attributeName="r" begin="3.5s" dur="2.6s" values="20;105" fill="freeze"/><animate attributeName="opacity" begin="3.5s" dur="2.6s" values="0.4;0.05" fill="freeze"/></circle><circle cx="415" cy="186" r="34" fill="url(#spark-glow)"/><circle cx="415" cy="186" r="5" fill="#ffd27d"/><rect x="30" y="352" width="55" height="1" fill="url(#rule-fade)"/><rect x="745" y="352" width="55" height="1" fill="url(#rule-fade)"/><circle cx="95" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><circle cx="735" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><text x="415" y="357" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15.5" fill="url(#gilded)" font-style="italic" letter-spacing="0.5">In the year 2018, the developer first set foot upon the public forge, and the epic began.</text><animate attributeName="opacity" begin="3s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><ellipse cx="415" cy="186" rx="330" ry="150" fill="url(#nebula)"/><circle cx="415" cy="186" r="40" fill="url(#spark-glow)"/><circle cx="415" cy="186" r="4" fill="#ffd27d" opacity="0.6"/><rect x="30" y="352" width="55" height="1" fill="url(#rule-fade)"/><rect x="745" y="352" width="55" height="1" fill="url(#rule-fade)"/><circle cx="95" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><circle cx="735" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><text x="415" y="357" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15.5" fill="url(#gilded)" font-style="italic" letter-spacing="0.5">Then came the year of abundance: the labors of 2019 doubled those of the year before.</text><animate attributeName="opacity" begin="6.5s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><ellipse cx="415" cy="186" rx="330" ry="150" fill="url(#nebula)"/><circle cx="415" cy="186" r="40" fill="url(#spark-glow)"/><circle cx="415" cy="186" r="4" fill="#ffd27d" opacity="0.6"/><rect x="30" y="352" width="55" height="1" fill="url(#rule-fade)"/><rect x="745" y="352" width="55" height="1" fill="url(#rule-fade)"/><circle cx="95" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><circle cx="735" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><text x="415" y="357" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15.5" fill="url(#gilded)" font-style="italic" letter-spacing="0.5">Then began the relentless campaign: thirty-five days of unbroken toil.</text><animate attributeName="opacity" begin="10s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><ellipse cx="415" cy="186" rx="330" ry="150" fill="url(#nebula)"/><circle cx="415" cy="186" r="40" fill="url(#spark-glow)"/><circle cx="415" cy="186" r="4" fill="#ffd27d" opacity="0.6"/><rect x="30" y="352" width="55" height="1" fill="url(#rule-fade)"/><rect x="745" y="352" width="55" height="1" fill="url(#rule-fade)"/><circle cx="95" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><circle cx="735" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><text x="415" y="357" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15.5" fill="url(#gilded)" font-style="italic" letter-spacing="0.5">And lo, meridian rose from nothing, and nine hundred stars gathered to witness it.</text><animate attributeName="opacity" begin="13.5s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><ellipse cx="415" cy="186" rx="330" ry="150" fill="url(#nebula)"/><circle cx="415" cy="186" r="40" fill="url(#spark-glow)"/><circle cx="415" cy="186" r="4" fill="#ffd27d" opacity="0.6"/><rect x="30" y="352" width="55" height="1" fill="url(#rule-fade)"/><rect x="745" y="352" width="55" height="1" fill="url(#rule-fade)"/><circle cx="95" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><circle cx="735" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><text x="415" y="357" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15.5" fill="url(#gilded)" font-style="italic" letter-spacing="0.5">And renown gathered upon the developer: a hundred stars in all.</text><animate attributeName="opacity" begin="17s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><ellipse cx="415" cy="186" rx="330" ry="150" fill="url(#nebula)"/><circle cx="415" cy="186" r="40" fill="url(#spark-glow)"/><circle cx="415" cy="186" r="4" fill="#ffd27d" opacity="0.6"/><rect x="30" y="352" width="55" height="1" fill="url(#rule-fade)"/><rect x="745" y="352" width="55" height="1" fill="url(#rule-fade)"/><circle cx="95" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><circle cx="735" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><text x="415" y="357" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15.5" fill="url(#gilded)" font-style="italic" letter-spacing="0.5">Then came the Dark Age: two hundred and twelve days, and not a single commit.</text><animate attributeName="opacity" begin="20.5s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><ellipse cx="415" cy="186" rx="330" ry="150" fill="url(#nebula)"/><circle cx="415" cy="186" r="40" fill="url(#spark-glow)"/><circle cx="415" cy="186" r="4" fill="#ffd27d" opacity="0.6"/><rect x="30" y="352" width="55" height="1" fill="url(#rule-fade)"/><rect x="745" y="352" width="55" height="1" fill="url(#rule-fade)"/><circle cx="95" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><circle cx="735" cy="352.5" r="1.8" fill="#d9b45b" opacity="0.8"/><text x="415" y="357" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15.5" fill="url(#gilded)" font-style="italic" letter-spacing="0.5">In the year 2022, the developer forsook JavaScript, and there was much refactoring.</text><animate attributeName="opacity" begin="24s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacit