"415" y="200" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" fill="#e8ecf5" font-weight="bold" letter-spacing="5">THE EPIC OF SAGA-OVERFLOW</text><text x="415" y="240" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#8b93a7" letter-spacing="3">· est. 2019 ·</text><animate attributeName="opacity" begin="0s" dur="3s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><circle cx="415" cy="186" r="46" fill="#ffd27d" opacity="0.08"/><circle cx="415" cy="186" r="27" fill="#ffd27d" opacity="0.2"/><circle cx="415" cy="186" r="13" fill="#ffd27d" opacity="0.55"/><circle cx="415" cy="186" r="5" fill="#ffd27d"/><text x="415" y="372" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#e8ecf5">In the year 2019, the developer first set foot upon the public forge, and the epic began.</text><animate attributeName="opacity" begin="3s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><circle cx="415" cy="186" r="46" fill="#ffd27d" opacity="0.05"/><circle cx="415" cy="186" r="27" fill="#ffd27d" opacity="0.1"/><circle cx="415" cy="186" r="13" fill="#ffd27d" opacity="0.18"/><text x="415" y="372" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#e8ecf5">And lo, lighthouse rose from nothing, and a hundred stars gathered to witness it.</text><animate attributeName="opacity" begin="6.5s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><circle cx="415" cy="186" r="46" fill="#ffd27d" opacity="0.05"/><circle cx="415" cy="186" r="27" fill="#ffd27d" opacity="0.1"/><circle cx="415" cy="186" r="13" fill="#ffd27d" opacity="0.18"/><text x="415" y="372" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#e8ecf5">And renown gathered upon the developer: a hundred stars in all.</text><animate attributeName="opacity" begin="10s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><circle cx="415" cy="186" r="46" fill="#ffd27d" opacity="0.05"/><circle cx="415" cy="186" r="27" fill="#ffd27d" opacity="0.1"/><circle cx="415" cy="186" r="13" fill="#ffd27d" opacity="0.18"/><text x="415" y="372" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#e8ecf5">And lo, forge rose from nothing, and nine hundred stars gathered to witness it.</text><animate attributeName="opacity" begin="13.5s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><circle cx="415" cy="186" r="46" fill="#ffd27d" opacity="0.05"/><circle cx="415" cy="186" r="27" fill="#ffd27d" opacity="0.1"/><circle cx="415" cy="186" r="13" fill="#ffd27d" opacity="0.18"/><text x="415" y="372" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#e8ecf5">In the year 2021, the developer forsook TypeScript, and there was much refactoring.</text><animate attributeName="opacity" begin="17s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><circle cx="415" cy="186" r="46" fill="#ffd27d" opacity="0.05"/><circle cx="415" cy="186" r="27" fill="#ffd27d" opacity="0.1"/><circle cx="415" cy="186" r="13" fill="#ffd27d" opacity="0.18"/><text x="415" y="372" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#e8ecf5">And lo, obsidian rose from nothing, and nine thousand stars gathered to witness it.</text><animate attributeName="opacity" begin="20.5s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><circle cx="415" cy="186" r="46" fill="#ffd27d" opacity="0.05"/><circle cx="415" cy="186" r="27" fill="#ffd27d" opacity="0.1"/><circle cx="415" cy="186" r="13" fill="#ffd27d" opacity="0.18"/><text x="415" y="372" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#e8ecf5">Then came the Dark Age: four hundred and eighty-seven days, and not a single commit.</text><animate attributeName="opacity" begin="24s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><circle cx="415" cy="186" r="46" fill="#ffd27d" opacity="0.05"/><circle cx="415" cy="186" r="27" fill="#ffd27d" opacity="0.1"/><circle cx="415" cy="186" r="13" fill="#ffd27d" opacity="0.18"/><text x="415" y="372" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#e8ecf5">Then came the Dark Age: seven hundred and fifty-eight days, and not a single commit.</text><animate attributeName="opacity" begin="27.5s" dur="3.5s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><text x="415" y="200" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" fill="#e8ecf5" font-weight="bold" letter-spacing="4">PRESENT DAY</text><text x="415" y="234" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#8b93a7" letter-spacing="2">2026-07-04</text><animate attributeName="opacity" begin="31s" dur="3s" values="0;1;1;0" keyTimes="0;0.12;0.88;1" fill="freeze"/></g><g opacity="0"><circle cx="415" cy="186" r="30" fill="#ffd27d" opacity="0.16"/><circle cx="415" cy="186" r="6" fill="#ffd27d"><animate attributeName="r" begin="34s" dur="7s" values="6;9;6" repeatCount="indefinite"/></circle><circle cx="415.59" cy="60.16" r="1.4" fill="#dbe6ff" opacity="0.2"><animate attributeName="opacity" begin="34s" dur="4.08s" values="0.2;0.8;0.2" repeatCount="indefinite"/></circle><circl